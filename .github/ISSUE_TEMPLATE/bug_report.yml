name: 🐛 Bug report
description: Report a problem with Speed Doctor
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Enter URL '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - Web (front-end)
        - API
        - Worker / audit pipeline
        - Docs
        - Not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, and whether you're self-hosting.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or screenshots.
      render: shell
    validations:
      required: false
